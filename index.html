<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>26년 상반기 디지털혁신 팀 빌딩 초대장</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    /* 기본 배경 및 모바일 스크롤 방지 */
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #050507;
      background-image: 
        radial-gradient(circle at 50% 50%, #2a0505 0%, transparent 70%),
        repeating-linear-gradient(45deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 4px);
      min-height: 100vh;
      color: #f3e6d0;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    
    /* 모바일에서 봉투 크기 자동 조절 */
    .envelope-card {
      background: #2a1212;
      border: 1px solid rgba(247, 213, 139, 0.1);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
      position: relative;
      width: 90vw;
      max-width: 420px;
      aspect-ratio: 3/2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 4px;
      margin-bottom: 2rem;
    }

    /* 입체적인 왁스 인장 CSS */
    .wax-seal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -20%);
      width: 80px;
      height: 80px;
      z-index: 10;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.7));
    }

    .wax-seal::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, #b22222, #700000 80%);
      border-radius: 48% 52% 45% 55% / 55% 48% 52% 45%; 
      box-shadow: 
        inset 2px 2px 5px rgba(255,255,255,0.2),
        inset -2px -2px 5px rgba(0,0,0,0.5),
        2px 5px 10px rgba(0,0,0,0.4);
    }

    .wax-seal::after {
      content: "";
      position: absolute;
      inset: 12px;
      background: #7a0000;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.15);
      box-shadow: 
        inset 3px 3px 6px rgba(0,0,0,0.6),
        inset -2px -2px 4px rgba(255,255,255,0.05);
    }

    /* 봉투 덮개 디자인 - 모바일 대응 */
    .envelope-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 45vw solid transparent;
      border-right: 45vw solid transparent;
      border-top: 30vw solid #3a1a1a;
      z-index: 1;
    }

    @media (min-width: 420px) {
      .envelope-card::before {
        border-left-width: 210px;
        border-right-width: 210px;
        border-top-width: 140px;
      }
    }

    /* 스캔라인 효과 */
    .scanline {
      width: 100%;
      height: 4px;
      background: linear-gradient(to bottom, transparent, rgba(255, 0, 0, 0.1), transparent);
      position: fixed;
      top: 0;
      left: 0;
      animation: scan 4s linear infinite;
      pointer-events: none;
      z-index: 100;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    /* 화면 전환 애니메이션 */
    .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 터치 버튼 피드백 */
    .btn-active:active {
      transform: scale(0.97);
      filter: brightness(0.85);
    }

    input[type="text"] {
      font-family: 'JetBrains Mono', monospace;
      -webkit-appearance: none;
      border-radius: 0;
    }

    /* 아이폰 노치 대응 */
    .safe-padding {
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body class="flex flex-col items-center p-6 pt-12 pb-12 safe-padding">
  <div class="scanline"></div>

  <!-- 시작 페이지 (보안 모드) -->
  <div id="startPage" class="w-full max-w-md flex flex-col items-center fade-in">
    <!-- 대형 편지 봉투 -->
    <div class="envelope-card overflow-hidden">
      <div class="wax-seal"></div>
    </div>
    
    <!-- 입력 및 하단 문구 (봉투 하단 배치) -->
    <div class="w-full flex flex-col items-center space-y-8 mt-4">
      <div class="w-full max-w-[280px] relative">
        <input type="text" id="employeeId" 
               inputmode="numeric"
               placeholder="password" 
               class="w-full bg-transparent border-b-2 border-[#f7d58b]/20 py-4 text-center text-[#f7d58b] placeholder-[#f7d58b]/30 focus:outline-none focus:border-[#f7d58b] transition-all text-2xl font-light tracking-[0.4em] z-20">
      </div>

<button onclick="openInvitation()"
        class="mt-6 px-8 py-3 border border-[#f7d58b]/40 text-[#f7d58b] text-sm font-black tracking-[0.3em] rounded-full hover:bg-[#f7d58b]/10 transition-all btn-active z-20">
  OPEN
</button>
   
      <div class="text-[12px] text-[#f7d58b]/40 tracking-[0.2em] font-bold z-20 uppercase text-center">
        26년 상반기 디지털혁신 팀 빌딩
      </div>

      <div id="errorMessage" class="hidden text-red-600 text-[11px] font-black uppercase tracking-widest animate-pulse z-20">
        Access Denied
      </div>
    </div>
  </div>

  <!-- 초대장 상세 페이지 -->
  <div id="invitationPage" class="hidden w-full max-w-sm space-y-6 fade-in">
    <div class="bg-black/80 backdrop-blur-xl border border-red-900/30 rounded-[2.5rem] p-7 relative overflow-hidden shadow-2xl">
      <div id="invitationContent"></div>
      
      <!-- 지도 및 집결지 링크 -->
      <div class="mt-10 pt-8 border-t border-red-900/20 space-y-4">
        <h4 class="text-[#f7d58b] text-[10px] font-black flex items-center gap-2 tracking-widest uppercase opacity-60">
          <span class="text-sm">📍</span> Rendezvous Point
        </h4>
        <a href="https://map.naver.com/p/directions/3zmTbO,2AJMH3,%EB%A1%AF%EB%8D%B0%EC%9B%94%EB%93%9C%ED%83%80%EC%9B%8C,35306752,PLACE_POI/3zn8jb,2AJP6O,%EB%A8%B8%EB%8D%94%ED%8C%8C%EC%BB%A4%20WOW%EC%9E%A0%EC%8B%A4%EC%A0%90,1086207417,PLACE_POI/-/walk?c=17.00,0,0,0,dh" 
           target="_blank" 
           class="flex items-center justify-between w-full p-5 bg-white/5 border border-white/10 rounded-2xl text-gray-200 text-sm font-bold btn-active transition-all active:bg-white/10">
          <span>장소 1: 머더파커 WOW 잠실점</span>
          <span class="text-[10px] text-red-500 font-black">MAP ➔</span>
        </a>
        <a href="https://map.naver.com/p/directions/3zn8jb,2AJP6O,%EB%A8%B8%EB%8D%94%ED%8C%8C%EC%BB%A4%20WOW%EC%9E%A0%EC%8B%A4%01%EC%A0%90,1086207417,PLACE_POI/3zn9z2,2AJQ3l,%EB%B0%A9%EC%9D%B4%20%EA%B4%91%EC%95%88%EB%A6%AC,1896562967,PLACE_POI/-/walk?c=19.00,0,0,0,dh" 
           target="_blank" 
           class="flex items-center justify-between w-full p-5 bg-white/5 border border-white/10 rounded-2xl text-gray-200 text-sm font-bold btn-active transition-all active:bg-white/10">
          <span>장소 2: 방이 광안리</span>
          <span class="text-[10px] text-red-500 font-black">MAP ➔</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    // 사번 데이터 매핑 (기존 유지)
    const employeeMap = {
      "1111": "A", "2222": "B", "3333": "C", "4444": "D",
      "2180": "B", "0066": "D", "0141": "B",
      "1024": "B", "0127": "C", "0004": "B",
      "0478": "C", "0146": "C", "0214": "C",
      "0095": "D"
    };

    const invitationData = {
      A: {
        badge: "G.A.S.A. CLASSIFIED",
        color: "blue",
        imageUrl: "dx1.jpg",
        members: "N/A",
        time: "17:00 사무실 출발 → 17:10 도착"
      },
      B: {
        badge: "파커랜드 초대장",
        color: "green",
        imageUrl: "dx2.jpg",
        members: "류*식, 최*규, 이*경, 김*민",
        time: "17:10 사무실 출발 → 17:20 도착"
      },
      C: {
        badge: "아틀라스",
        color: "indigo",
        imageUrl: "dx3.jpg",
        members: "안*현, 박*예, 황*현, 정*민",
        time: "17:15 사무실 출발 → 17:25 도착"
      },
      D: {
        badge: "특별 초대장",
        color: "red",
        members: "디지털혁신팀원",
        time: "자율 합류 (19:00)"
      }
    };

    function openInvitation() {
      const input = document.getElementById("employeeId");
      const id = input.value.trim();
      const type = employeeMap[id];
      const err = document.getElementById("errorMessage");

      if (!type) {
        err.classList.remove("hidden");
        input.classList.add("border-red-600");
        return;
      }

      renderContent(type);
      document.getElementById("startPage").classList.add("hidden");
      document.getElementById("invitationPage").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderContent(type) {
      const data = invitationData[type];
      const container = document.getElementById("invitationContent");
      
      const badgeStyles = {
        blue: "bg-blue-500/20 text-blue-400 border-blue-500/40",
        green: "bg-green-500/20 text-green-400 border-green-500/40",
        indigo: "bg-indigo-500/20 text-indigo-400 border-indigo-500/40",
        red: "bg-red-500/20 text-red-400 border-red-500/40"
      };

      let html = `
        <div class="inline-block px-3 py-1.5 rounded-lg text-[10px] font-black border ${badgeStyles[data.color]} mb-8 uppercase tracking-[0.2em]">
          ${data.badge}
        </div>
      `;

      if (type !== 'D') {
        html += `
          <div class="relative mb-8">
            <img src="${data.imageUrl}" class="w-full h-auto object-cover rounded-3xl border border-white/10 shadow-2xl">
            <div class="absolute inset-0 rounded-3xl shadow-inner bg-gradient-to-t from-black/60 to-transparent"></div>
          </div>
        `;
      }

      if (type === 'A') {
        html += `
          <div class="space-y-6">
            <p class="text-xl font-bold text-blue-50 leading-snug">
              우주의 미래는 G.A.S.A.가 책임집니다.<br>당신은 그 미래를 바꿀 <span class="text-blue-400 underline decoration-blue-500/50 underline-offset-4">헬퍼 요원</span>입니다.
            </p>
            <div class="space-y-3">
              <div class="bg-blue-950/30 p-5 rounded-2xl border border-blue-900/30">
                <h3 class="text-blue-400 font-black text-sm mb-2 uppercase tracking-tighter">TASK 01 실종 요원 구출</h3>
                <p class="text-[13px] text-blue-100/70 leading-relaxed">구조를 기다리는 요원을 무사히 지구로 귀환시키는 것이 당신의 첫 임무입니다.</p>
              </div>
              <div class="bg-blue-950/30 p-5 rounded-2xl border border-blue-900/30">
                <h3 class="text-blue-400 font-black text-sm mb-2 uppercase tracking-tighter">TASK 02 신광석 채집</h3>
                <p class="text-[13px] text-blue-100/70 leading-relaxed">실종된 요원이 수행하던 극한 행성의 광석 채집 임무를 완수하십시오.</p>
              </div>
            </div>
          </div>
        `;
      } else if (type === 'B') {
        html += `
          <div class="space-y-6">
            <div class="bg-green-950/30 p-6 rounded-3xl border border-green-900/30">
              <p class="text-2xl font-black text-green-400 mb-4 italic leading-tight">"김파커가 돌아왔다!"</p>
              <p class="text-[14px] text-green-100/80 leading-relaxed font-medium">
                환상의 나라 파커랜드에 오신 것을 환영합니다. 어느 날 도착한 한 통의 초대장과 신비로운 토큰... <br><br>
                이건 운명일까요? 상상 그 이상의 세계가 지금 열립니다.
              </p>
            </div>
            <p class="text-center font-bold text-green-500 animate-bounce text-sm">파커랜드, 입장하시겠습니까?</p>
          </div>
        `;
      } else if (type === 'C') {
        html += `
          <div class="space-y-6">
            <h2 class="text-2xl font-black text-indigo-400 tracking-tight">아틀라스를 찾아서</h2>
            <div class="bg-indigo-950/30 p-6 rounded-3xl border border-indigo-900/30 text-[14px] leading-relaxed text-indigo-100/80 italic font-medium">
              "아틀라스는 실존한다..."<br><br>
              해양연구소장인 당신에게 전달된 낡은 지도와 사진. 전설은 끝나지 않았습니다. 심해 속 아틀라스의 보물을 찾는 모험이 지금 시작됩니다.
            </div>
          </div>
        `;
      } else if (type === 'D') {
        html += `
          <div class="space-y-6">
            <p class="text-xl font-black text-red-100 leading-snug">
              당신은 <span class="text-red-500 underline underline-offset-4 decoration-red-500/50 italic">시크릿 키퍼</span>입니다.
            </p>
            <p class="text-sm text-gray-400 font-medium">우승이 예상되는 팀을 응원하십시오. 당신은 그들과 한 팀이 됩니다.</p>
            <div class="bg-red-950/30 p-6 rounded-3xl border border-red-900/30 space-y-5">
              <div class="flex flex-col gap-1">
                <span class="text-[10px] text-red-500 font-black tracking-widest uppercase opacity-60">Team 01</span>
                <span class="text-sm font-bold text-red-100">N/A</span>
              </div>
              <div class="flex flex-col gap-1">
                <span class="text-[10px] text-red-500 font-black tracking-widest uppercase opacity-60">Team 02</span>
                <span class="text-sm font-bold text-red-100">류*식, 최*규, 이*경, 김*민</span>
              </div>
              <div class="flex flex-col gap-1">
                <span class="text-[10px] text-red-500 font-black tracking-widest uppercase opacity-60">Team 03</span>
                <span class="text-sm font-bold text-red-100">안*현, 박*예, 황*현, 정*민</span>
              </div>
            </div>
            <p class="text-[11px] text-gray-500 font-bold text-center">선택한 조를 '김*민'에게 조용히 전달하십시오.</p>
          </div>
        `;
      }

      html += `
        <div class="mt-10 pt-6 border-t border-white/5 space-y-3">
          <div class="flex items-center justify-between text-[11px] font-black uppercase tracking-[0.15em] text-gray-500">
            <span>Personnel</span>
            <span class="text-[#f7d58b]">${data.members}</span>
          </div>
          <div class="flex items-center justify-between text-[11px] font-black uppercase tracking-[0.15em] text-gray-500">
            <span>Time</span>
            <span class="text-[#f7d58b]">${data.time}</span>
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    // 엔터 키 입력 시 인증 실행 및 모바일 키보드 닫기
    document.getElementById("employeeId").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        openInvitation();
        e.target.blur();
      }
    });
  </script>
</body>
</html>
